name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Syntax Check
        run: |
          node --check src/server.js
          node --check src/db.js
          node --check src/auth.js
          node --check src/aiModel.js

      - name: Build HTML5 Portable
        run: npm run build:webapp
